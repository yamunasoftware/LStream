<!DOCTYPE html>

<html lang="en">

<!-- Meta Tags -->
<meta charset="utf-8" />
<meta name="viewport" content="initial-scale=1, width=device-width, height=device-height, viewport-fit=cover">

<!-- Tab -->
<head>
  <title> LStream </title>
</head>

<!-- Stylesheet -->
<style>
  /* ELEMENTS CONTROL */

  html, body, #container {
    margin: 0px;
    background-color: #000000;
    width: 100%;
    height: 100%;
    scroll-behavior: smooth;
    font-size: 20px;
    color: #4475B8;
    text-align: center;
    font-family: Arial, Helvetica, sans-serif;
    font-weight: bold;
  }

  #videoPlayer {
    width: 50%;
    height: 50%;
  }

  /* CLASSES CONTROL */

  .card {
    margin: 20px;
    padding: 20px;
    border-radius: 10px;
    border: 5px solid #4475B8;
    background-color: #000000;
    color: #4475B8;
    font-size: 20px;
  }

  .card:hover {
    border: 5px solid #FFFFFF;
  }

  /* SCROLLING */

  ::-webkit-scrollbar {
    width: 10px;
  }

  ::-webkit-scrollbar-track {
    background: #000000;
  }

  ::-webkit-scrollbar-thumb {
    background: #4475B8;
  }

  ::-webkit-scrollbar-thumb:hover {
    background: #1662CE;
  }
</style>

<!-- Videos Script -->
<script>
  //Videos Array:
  var videos = [
    "sample"
  ];
</script>

<!-- Script -->
<script>
  /* WINDOW FUNCTIONS */

  //Onload Function:
  window.onload = function () {
    //Find the Videos:
    document.getElementById('videoContainer').style.display = "none";
    findVideos();
  }

  //Key Event Listener:
  window.addEventListener("keydown", function (e) {
    //Checks the Case:
    if (e.key == "Enter") {
      //Runs the Play:
      playVideo();
    }
  }, true);

  /* VIDEO FUNCTIONS */

  //Play Video Function:
  function playVideo(file) {
    //Gets the Video Elements:
    var video = document.getElementById('videoPlayer');
    var source = document.createElement('source');
    document.getElementById('selectionContainer').style.display = "none";
    document.getElementById('videoContainer').style.display = "block";

    //Video Error Event Listener:
    video.addEventListener("error", function (e) {
      //Displays Error:
      alert("An Error Ocurred\nPlease Try Again");
      window.location.reload();
    }, true);

    //Sets the Video Attributes:
    source.setAttribute('src', '/Media/' + file + '.mp4');
    source.setAttribute('type', 'video/mp4');

    //Plays the Video:
    video.appendChild(source);
    video.setAttribute("controls", "controls");
    video.webkitRequestFullscreen();
    video.play();

    //Sets the Scrubbing:
    autoScrub(file);
    setAutoScrub(file);
  }

  //Find Videos Function:
  function findVideos() {
    //Loop Variables:
    var turns = 0;
    var videoDOM = "";

    //Loops through Array:
    mainLoop: while (turns < videos.length) {
      //Adds an Element:
      videoDOM += 
        "<div> <button class='card' onclick='playVideo(" + JSON.stringify(videos[turns]) + ");'>" + 
        videos[turns];

      //Checks the Case:
      if (localStorage.getItem(videos[turns]) != null) {
        //Time Array Variables:
        var array = JSON.parse(localStorage.getItem(videos[turns]));
        var remaining = array[1] - array[0];

        //Hours Calculations:
        var hours = remaining / 3600.0;
        var hours = hours.toFixed(0);

        //Minutes Calculations:
        var minutes = (remaining / 60.0) - (hours * 60.0);
        minutes = minutes.toFixed(0);
        
        //Adds and Element:
        videoDOM += "<br /> <br />" + 
          hours + "h " + minutes + "m";
      }

      //Adds and Element:
      videoDOM += "</button> </div>";
      
      turns++;
    }

    //Sets the Inner HTML:
    document.getElementById('selectionContainer').innerHTML = videoDOM;
  }

  /* SCRUB FUNCTIONS */

  //Automatic Scrub Function:
  function autoScrub(file) {
    //Gets the Scrub Value:
    var video = document.getElementById('videoPlayer');
    var scrub = localStorage.getItem(file);
    
    //Checks the Case:
    if (scrub != null) {
      //Scrubs to the Value:
      var array = JSON.parse(scrub);
      video.currentTime = array[0];
    }
  }

  //Set Automatic Scrub Function:
  function setAutoScrub(file) {
    //Video Element:
    var video = document.getElementById('videoPlayer');
    
    //Scrub Interval:
    setInterval(function () {
      //Sets the Automatic Scrub Value:
      var array = [video.currentTime, video.duration];
      localStorage.setItem(file, JSON.stringify(array));
    }, 1000);
  }
</script>

<!-- Container -->
<div id="container">

  <!-- Body -->
  <body>
    <!-- Video Container -->
    <div id="videoContainer" style="margin: 20px;">
      <!-- Video Player-->
      <div id="vidoHolder">
        <video id="videoPlayer"></video>
      </div>
        
      <!-- New Query Button -->
      <button class="card" onclick="window.location.reload();"> New </button>
    </div>

    <!-- Selection Container -->
    <div id="selectionContainer"></div>
  </body>
</div>

</html>
